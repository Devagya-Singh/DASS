<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>DASS Dashboard</title>
</head>
<body>
    <header class="glass-header">
        <div class="logo">
            <img src="logo.png" alt="DASS Logo">
            <span>Dynamic Academic Submission System</span>
        </div>
        <div class="search-bar">
            <form action="/search" method="GET">
                <input type="text" class="search-input" placeholder="Search..." name="search">
                <button type="submit" class="search-button">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        </div>
        <div class="user-actions">
            <button class="icon-button"><i class="fa-regular fa-bell"></i></button>
            <button class="icon-button"><i class="fa-regular fa-user"></i></button>
        </div>
    </header>

    <nav class="main-nav">
        <a href="dashboard.html" class="nav-button">Dashboard</a>
        <a href="index.html" class="nav-button">Home</a>
        <a href="publications.html" class="nav-button">My Publications</a>
        <a href="aboutus.html" class="nav-button">About Us</a>
        <a href="archives.html" class="nav-button">Archives</a>
    </nav>

    <main class="dashboard-container">
        <section class="articles-section">
            <h2>Recent Articles</h2>
            <div class="articles-grid">
                <!-- Article cards will be dynamically inserted here -->
            </div>
        </section>

        <aside class="sidebar">
            <div class="quick-actions">
                <button class="action-button">Add New Publication</button>
            </div>
            <div class="calendar-widget">
                <iframe src="https://calendar.google.com/calendar/embed?src=adrija1802%40gmail.com&ctz=Asia%2FKolkata" style="border: 0" width="100%" height="400" frameborder="0" scrolling="no"></iframe>
            </div>
        </aside>
    </main>

    <script src="./script.js"></script>
</body>
</html>
