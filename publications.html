<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Publications - DASS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo">
            <img src="logo.png" alt="DASS Logo">
            <span>DASS</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="publications.html">Publications</a>
            <a href="aboutus.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <section class="hero">
        <div class="gradient-overlay"></div>
        <div class="content">
            <h1>My Publications</h1>
            <p>Manage your research publications and submissions</p>
        </div>
    </section>

    <div class="container">
        <div class="profile-section">
            <div class="profile-header">
                <img src="pfp.png" alt="Profile Picture" class="profile-image">
                <h2 class="profile-name">User Name</h2>
                <a href="#" class="edit-profile"><i class="fa-regular fa-pen-to-square"></i></a>
            </div>
            
            <div class="user-details">
                <h3>User Details</h3>
                <form class="user-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="form-group">
                        <label for="contact">Contact</label>
                        <input type="tel" id="contact" name="contact">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location">
                    </div>
                    <div class="form-group">
                        <label for="organization">Organization</label>
                        <input type="text" id="organization" name="organization">
                    </div>
                </form>
            </div>
            
            <div class="account-actions">
                <a href="#" class="btn-gold">Change Password</a>
                <a href="#" class="btn-danger">Delete Account</a>
            </div>
        </div>
        
        <div class="publications-list">
            <h2>My Publications</h2>
            <p class="no-publications">No publications yet. Add your first publication!</p>
            <a href="add_publications.html" class="btn-gold">Add New Publication</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
