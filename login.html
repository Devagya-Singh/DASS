<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DASS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo">
            <img src="logo.png" alt="DASS Logo">
            <span>DASS</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="publications.html">Publications</a>
            <a href="aboutus.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <section class="hero">
        <div class="gradient-overlay"></div>
        <div class="content">
            <h1>Login to DASS</h1>
            <p>Access your research dashboard and publications</p>
        </div>
    </section>

    <div class="login-section">
        <form id="login-form">
            <div class="social-login">
                <button type="button" class="btn-social btn-google">Login with Google</button>
                <button type="button" class="btn-social btn-linkedin">Login with LinkedIn</button>
                <button type="button" class="btn-social btn-orcid">Login with ORCID</button>
                <button type="button" class="btn-social btn-facebook">Login with Facebook</button>
            </div>

            <div class="login-divider">OR</div>

            <div class="input-container">
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required id="password" oninput="checkPasswordStrength()">
                <div id="password-strength"></div>
            </div>

            <div class="password-tips">
                <p>Tips for a strong password:</p>
                <ul>
                    <li>Use a mix of uppercase and lowercase letters</li>
                    <li>Include numbers and special characters</li>
                    <li>Avoid common words and sequences</li>
                </ul>
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox" name="remember"> Remember Me</label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-gold">Login</button>
        </form>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById("password").value;
            const strengthMeter = document.getElementById("password-strength");
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

            if (strength == 1) {
                strengthMeter.textContent = "Weak Password";
                strengthMeter.style.color = "red";
            } else if (strength == 2) {
                strengthMeter.textContent = "Medium Password";
                strengthMeter.style.color = "yellow";
            } else if (strength >= 3) {
                strengthMeter.textContent = "Strong Password";
                strengthMeter.style.color = "green";
            } else {
                strengthMeter.textContent = "";
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
